<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Prevent iOS from zooming on text fields -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mag messenger</title>
  <link rel="stylesheet" href="style/chat.css" />
</head>
<body class="light-theme">
  <!-- HOME SCREEN -->
  <div id="home-screen" class="screen">
    <div class="home-header">
      <div class="mag-logo">mag messenger</div>
      <button class="settings-btn" id="openSettingsBtn">Settings</button>
    </div>
    <ul class="conversation-list">
      <li class="conversation-item" data-conversation="pasky">
        <div class="conversation-avatar">👤</div>
        <div class="conversation-info">
          <div class="conversation-name">Pasky</div>
          <div class="conversation-status status-online">Online</div>
        </div>
      </li>
      <li class="conversation-item" data-conversation="sally">
        <div class="conversation-avatar">😊</div>
        <div class="conversation-info">
          <div class="conversation-name">Sally</div>
          <div class="conversation-status status-online">Online</div>
        </div>
      </li>
      <li class="conversation-item" data-conversation="bob">
        <div class="conversation-avatar">😎</div>
        <div class="conversation-info">
          <div class="conversation-name">Bob</div>
          <div class="conversation-status status-away">Away</div>
        </div>
      </li>
      <li class="conversation-item" data-conversation="jenny">
        <div class="conversation-avatar">🤩</div>
        <div class="conversation-info">
          <div class="conversation-name">Jenny</div>
          <div class="conversation-status status-busy">Busy</div>
        </div>
      </li>
    </ul>
  </div>

  <!-- MESSENGER CHAT SCREEN -->
  <div id="chattertrap" class="screen">
    <div class="chattertrap-container">
      <div class="header">
        <button id="backBtn" class="back-button">←</button>
        <div class="chat-header-info">
          <div class="chat-name" id="chatName">Pasky</div>
          <div class="chat-status" id="chatStatus">Online</div>
        </div>
        <div class="header-buttons">
          <button id="menuBtn" class="action-button menu-button">Menu</button>
          <div class="menu-dropdown" id="menuDropdown">
            <button id="modeToggleBtn">Switch to Dark Mode</button>
          </div>
          <button id="nudgeBtn" class="action-button">Nudge</button>
        </div>
      </div>
      <div class="chat" id="chat"></div>
      <div class="footer">
        <div class="user-avatar">🤖</div>
        <div class="input-container">
          <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" />
          <button id="sendBtn" class="send-btn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>Settings</h2>
      <label for="themeSelect">Theme</label>
      <select id="themeSelect">
        <option value="light" selected>Light</option>
        <option value="dark">Dark</option>
      </select>
      <label for="customStatus">Custom Status</label>
      <input type="text" id="customStatus" placeholder="Enter status" />
      <button id="saveSettingsBtn">Save</button>
    </div>
  </div>

  <!-- Optional Nudge Sound -->
  <audio id="nudgeSound" src="nudge.mp3" preload="auto"></audio>
  <script src="js/chat.js"></script>
</body>
</html>
